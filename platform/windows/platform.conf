# Dolet Platform Configuration — Windows x64
# This file tells the compiler how to link on this platform.
# The codegen itself is platform-neutral (pure MLIR).

[toolchain]
translate = mlir-translate.exe
compile = clang.exe
linker = lld-link.exe
obj_ext = .obj
exe_ext = .exe
target_triple = x86_64-pc-windows-msvc

[link]
# Default system libraries (always linked)
default_libs = kernel32, ws2_32, msvcrt-math
# Runtime helpers object (provides _fltused, __chkstk)
runtime_helpers = runtime_helpers.obj
# System library search path (relative to library/)
sys_path = platform/windows
# Stack size in bytes
stack_size = 8388608
# Entry point
entry = main

[link.flags]
# How linker flags are formatted (lld-link COFF style)
output = -out:{path}
libpath = -libpath:{path}
defaultlib = -defaultlib:{name}
subsystem_console = -subsystem:console
subsystem_gui = -subsystem:windows
flag_entry = -entry:{name}
stack = -stack:{size}

[path]
# Path separator character
separator = \
# How absolute paths look (drive letter check)
absolute_check = drive_letter
