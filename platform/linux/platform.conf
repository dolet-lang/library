# Dolet Platform Configuration — Linux x64
# This file tells the compiler how to link on this platform.
# The codegen itself is platform-neutral (pure MLIR).
#
# Dolet on Linux is PURE — no libc dependency.
# All syscalls go through raw `syscall` instruction in runtime_helpers.ll

[toolchain]
translate = mlir-translate
compile = clang
linker = ld.lld
obj_ext = .o
exe_ext =
target_triple = x86_64-linux

[link]
# No default system libraries — everything is raw syscalls
default_libs =
# Runtime helpers (syscall wrappers, mmap allocator, _start entry)
runtime_helpers = runtime_helpers.o
# System library search path (relative to library/)
sys_path = platform/linux
# Stack size in bytes
stack_size = 8388608
# Entry point (runtime_helpers provides _start which calls main)
entry = _start

[link.flags]
# How linker flags are formatted (ld.lld ELF style)
output = -o {path}
libpath = -L{path}
defaultlib = -l{name}
subsystem_console =
subsystem_gui =
flag_entry = --entry={name}
stack = -z stacksize={size}

[path]
# Path separator character
separator = /
# How absolute paths look (starts with /)
absolute_check = leading_slash
